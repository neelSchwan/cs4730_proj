<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Review Anything</title>
</head>
<body>
  <h1>Review Anything</h1>
  <p id="user-status">not logged in</p>

  <h2>Login / Register</h2>
  <input type="text" id="username-input" placeholder="username" />
  <button onclick="register()">register / log in</button>
  <p id="register-msg"></p>

  <hr />

  <h2>Write a Review</h2>
  <input type="text" id="subject" placeholder="what are you reviewing?" /><br /><br />
  <input type="number" id="rating" placeholder="rating (0-5)" min="0" max="5" step="0.1" /><br /><br />
  <textarea id="description" placeholder="write your review..." rows="4" cols="40"></textarea><br /><br />
  <button onclick="submitReview()">post review</button>
  <p id="submit-msg"></p>

  <hr />

  <h2>Reviews</h2>
  <button onclick="loadReviews()">refresh</button>
  <div id="feed">loading...</div>

  <script>
    const API = '';
    let currentUser = JSON.parse(localStorage.getItem('ra_user') || 'null');

    function applyUserState() {
      document.getElementById('user-status').textContent = currentUser
        ? `logged in as: ${currentUser.username} (id: ${currentUser.user_id})`
        : 'not logged in';
    }

    async function register() {
      const username = document.getElementById('username-input').value.trim();
      if (!username) return;
      const res = await fetch(`${API}/users`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username })
      });
      const data = await res.json();
      currentUser = { username, user_id: data.user_id };
      localStorage.setItem('ra_user', JSON.stringify(currentUser));
      applyUserState();
      document.getElementById('register-msg').textContent = `welcome, ${username}! your id is ${data.user_id}`;
    }

    async function submitReview() {
      if (!currentUser) { alert('log in first'); return; }
      const subject = document.getElementById('subject').value.trim();
      const rating = parseFloat(document.getElementById('rating').value);
      const description = document.getElementById('description').value.trim();
      if (!subject || !description || isNaN(rating)) { alert('fill in all fields'); return; }
      const res = await fetch(`${API}/reviews`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: currentUser.user_id, rating, subject, description })
      });
      const data = await res.json();
      document.getElementById('submit-msg').textContent = `posted! review id: ${data.review_id}`;
      loadReviews();
    }

    async function loadReviews() {
      const res = await fetch(`${API}/reviews`);
      const reviews = await res.json();
      document.getElementById('feed').innerHTML = reviews.length
        ? reviews.map(r => `<p><strong>${r.subject}</strong> (${r.rating}/5) — ${r.description} <em>by user ${r.user_id}</em></p>`).join('')
        : '<p>no reviews yet</p>';
    }

    applyUserState();
    loadReviews();
  </script>
</body>
</html>
